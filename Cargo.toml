[package]
name = "lopa-lang"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1.0.100"
bitflags = "2.10.0"
byteorder = "1.5.0"
derive_more = { version = "2.1.1", features = ["add", "add_assign", "from"] }
itertools = "0.14.0"
mlua = { version = "0.11.5", features = ["luajit52"] }
num-complex = "0.4.6"
ordered-float = "5.1.0"
paste = "1.0.15"
proc-macro2 = "1.0.106"
residua-uleb128 = "0.2.0"
strum = { version = "0.27.2", features = ["derive"] }
strum_macros = "0.27.2"
syn = {version ="2.0.114", features = ["full", "extra-traits"]}
thiserror = "2.0.17"
